services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mongo
    command: ["python", "-m", "app"]

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mongo
    ports:
      - "8000:8000"
    command: ["python", "-m", "app.web"]

volumes:
  mongo_data:

